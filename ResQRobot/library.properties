author=ResQ Robotics Team
maintainer=ResQ Robotics Team <noreply@example.com>
sentence=Modular Arduino library for the ResQ Rescue Line robot kit (APDS9960, BNO055, VL53L0X, HC-SR04, servo, tread-drive TT motors).
paragraph=Provides one simple, well-documented class per sensor/actuator on the ResQ kit, plus a ResQRobot facade that wires them all together using the kit's default pin layout. Lets RCJ Rescue Line teams read sensors and drive their robot in a few lines of code instead of copy-pasting register-level examples.
category=Robotics
